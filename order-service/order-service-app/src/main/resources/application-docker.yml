server:
  port: ${SERVER_PORT:8004}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:order_db}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: ${DB_USER:order_user}
    password: ${DB_PASSWORD:order_pass_2026}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# 跨服务调用配置
service:
  product-url: ${PRODUCT_SERVICE_URL:http://product-service:8002}
  points-url: ${POINTS_SERVICE_URL:http://points-service:8003}
  connect-timeout: ${CONNECT_TIMEOUT:1000}
  read-timeout: ${READ_TIMEOUT:2000}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health
