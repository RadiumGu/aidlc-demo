# ============================================================
# Auth Service
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: awesomeshop
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 926093770964.dkr.ecr.ap-northeast-1.amazonaws.com/awesomeshop/auth-service:v2
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: awesomeshop-db
                  key: db-host
            - name: DB_NAME
              value: awsome_shop_auth
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: awesomeshop-db
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: awesomeshop-db
                  key: db-password
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: awesomeshop-db
                  key: redis-host
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: awesomeshop
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP

