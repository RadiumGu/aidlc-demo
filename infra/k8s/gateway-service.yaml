# ============================================================
# Gateway Service — Spring Cloud Gateway
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: awesomeshop
  labels:
    app: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: 926093770964.dkr.ecr.ap-northeast-1.amazonaws.com/awesomeshop/gateway-service:v4
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: awesomeshop-db
                  key: db-host
            - name: DB_NAME
              value: awsome_shop_gateway
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: awesomeshop-db
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: awesomeshop-db
                  key: db-password
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: awesomeshop-db
                  key: redis-host
            # Gateway 路由到 K8s Service（注意 docker profile 的端口映射）
            - name: AUTH_SERVICE_URL
              value: "http://auth-service.awesomeshop:8081"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service.awesomeshop:8082"
            - name: POINTS_SERVICE_URL
              value: "http://points-service.awesomeshop:8083"
            - name: ORDER_SERVICE_URL
              value: "http://order-service.awesomeshop:8084"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: awesomeshop
spec:
  selector:
    app: gateway-service
  ports:
    - port: 8080
      targetPort: 8081
  type: ClusterIP
