# Docker Environment Configuration
# 容器化部署环境配置

server:
  port: 8081

spring:
  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      database: 0

  # 数据源配置
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:awsome_shop_gateway}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

    # Druid 连接池配置
    druid:
      initial-size: 10
      min-idle: 5
      max-active: 50
      max-wait: 60000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      stat-view-servlet:
        enabled: false

  # Spring Cloud Gateway Routes
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-public
              uri: ${gateway.services.auth}
              predicates:
                - Path=/api/v1/public/auth/**
              metadata:
                auth-required: false
            - id: product-public
              uri: ${gateway.services.product}
              predicates:
                - Path=/api/v1/public/product/**
              metadata:
                auth-required: false
            - id: point-public
              uri: ${gateway.services.point}
              predicates:
                - Path=/api/v1/public/point/**
              metadata:
                auth-required: false
            - id: order-public
              uri: ${gateway.services.order}
              predicates:
                - Path=/api/v1/public/order/**
              metadata:
                auth-required: false
            - id: product-admin
              uri: ${gateway.services.product}
              predicates:
                - Path=/api/v1/admin/product/**
              metadata:
                auth-required: true
            - id: points-admin
              uri: ${gateway.services.point}
              predicates:
                - Path=/api/v1/admin/points/**
              metadata:
                auth-required: true
            - id: order-admin
              uri: ${gateway.services.order}
              predicates:
                - Path=/api/v1/admin/order/**
              metadata:
                auth-required: true
            - id: auth-protected
              uri: ${gateway.services.auth}
              predicates:
                - Path=/api/v1/auth/**
              metadata:
                auth-required: true
            - id: product-protected
              uri: ${gateway.services.product}
              predicates:
                - Path=/api/v1/product/**
              metadata:
                auth-required: true
            - id: point-protected
              uri: ${gateway.services.point}
              predicates:
                - Path=/api/v1/point/**, /api/v1/points/**
              metadata:
                auth-required: true
            - id: order-protected
              uri: ${gateway.services.order}
              predicates:
                - Path=/api/v1/order/**
              metadata:
                auth-required: true

# Gateway backend service URLs (K8s Service DNS)
gateway:
  services:
    auth: ${AUTH_SERVICE_URL:http://auth-service:8081}
    product: ${PRODUCT_SERVICE_URL:http://product-service:8082}
    point: ${POINTS_SERVICE_URL:http://points-service:8083}
    order: ${ORDER_SERVICE_URL:http://order-service:8084}
  auth:
    validate-url: ${AUTH_SERVICE_URL:http://auth-service:8081}/api/v1/internal/auth/validate

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      banner: false

# Security 配置
security:
  jwt:
    secret: ${JWT_SECRET:docker-secret-key-for-jwt-token-must-be-at-least-256-bits-long-for-hmac-sha256}
    expiration: ${JWT_EXPIRATION:7200}
    issuer: awsome-shop-gateway-service
  login:
    max-failed-attempts: 5
    lock-duration: 1800

# Shop 配置
shop:
  security:
    encryption:
      key: ${ENCRYPTION_KEY:dockerEncryptionKey1234567890ab}

# 日志配置
logging:
  level:
    root: INFO
    com.awsome: INFO
