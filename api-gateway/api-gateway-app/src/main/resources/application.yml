server:
  port: 8080

spring:
  application:
    name: api-gateway

# 本地开发默认配置
JWT_SECRET: dev-secret-key-for-local-development-only-32chars

AUTH_SERVICE_URL: http://localhost:8001
PRODUCT_SERVICE_URL: http://localhost:8002
POINTS_SERVICE_URL: http://localhost:8003
ORDER_SERVICE_URL: http://localhost:8004

CONNECT_TIMEOUT: 1000
READ_TIMEOUT: 2000

logging:
  level:
    com.awsome.shop.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
